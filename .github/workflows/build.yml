name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check template style synchronization
        shell: pwsh
        run: ./scripts/check-style-sync.ps1

      - name: Check template structure
        shell: pwsh
        run: ./scripts/check-template-structure.ps1

      - name: Check beginner guidance
        shell: pwsh
        run: ./scripts/check-beginner-guidance.ps1

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-bibtex-extra texlive-science texlive-lang-chinese fonts-noto-cjk
          sudo apt-get install -y latexmk

      - name: Build main document
        run: latexmk -xelatex main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: main.pdf
          path: main.pdf

      - name: Validate release packaging
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 v0.0.0
          ./scripts/check-release-assets.ps1 v0.0.0

  build-templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [njfu-course-paper, personal-quickstart]
    steps:
      - uses: actions/checkout@v6

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-bibtex-extra texlive-science texlive-lang-chinese fonts-noto-cjk
          sudo apt-get install -y latexmk

      - name: Build ${{ matrix.template }}
        working-directory: templates/${{ matrix.template }}
        run: latexmk -xelatex main.tex

      - name: Upload ${{ matrix.template }} PDF
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.template }}.pdf
          path: templates/${{ matrix.template }}/main.pdf
