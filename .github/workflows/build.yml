name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-bibtex-extra
          sudo apt-get install -y latexmk

      - name: Install missing packages
        run: |
          sudo tlmgr install diagbox pict2e ifoddpage needspace relsize appendix algorithm2e

      - name: Build main document
        run: latexmk -xelatex main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: main.pdf
          path: main.pdf

  build-templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [njfu-course-paper, personal-quickstart]
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-bibtex-extra
          sudo apt-get install -y latexmk

      - name: Install missing packages
        run: |
          sudo tlmgr install diagbox pict2e ifoddpage needspace relsize appendix algorithm2e

      - name: Build ${{ matrix.template }}
        working-directory: templates/${{ matrix.template }}
        run: latexmk -xelatex main.tex

      - name: Upload ${{ matrix.template }} PDF
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.template }}.pdf
          path: templates/${{ matrix.template }}/main.pdf
